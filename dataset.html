<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EgoVerse | Dataset</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <header class="site-header"></header>
  <script src="./assets/js/nav.js"></script>

  <main>
  <section class="section">
    <div class="container">
      <div class="section-head">
        <h2>Dataset Details</h2>
      </div>

      <!-- Access -->
      <div class="card" id="access">
        <h3>Access</h3>
        <div class="row">
          <a class="btn btn-join" href="https://partners.mecka.ai/egoverse">
            Dataset Browser <span class="arrow">→</span>
          </a>
          <a class="btn btn-join" href="https://github.com/GaTech-RL2/EgoVerse" target="_blank" rel="noopener">
            Download Dataset <span class="arrow">→</span>
          </a>
          <p>
            All data is released under CC BY-SA 4.0
          </p>
        </div>
      </div>
      
      <!-- Task Descriptions -->
      <div class="card dataset-block" style="margin-top:14px;">
        <h3>Dense Annotation Ready for Policy Learning</h3>
        <div class="video-grid">
          <div class="dataset-video-tile">
            <video muted loop playsinline autoplay>
              <source src="./assets/videos/dense-language-overlay.mp4" type="video/mp4" />
            </video>
          </div>
        </div>
          <p>
            Accurate 3D Egocentric Pose, Hand Tracking, and Dense Language Annotations
          </p>
      </div>

    </div>
  </section>
</main>

  <footer class="footer"></footer>

  <script src="./assets/js/main.js"></script>
  <script src="./assets/js/footer.js"></script>
</body>
</html>
